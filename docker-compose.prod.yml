# ------------------------------------------------------------------------------------------------
# Compose de produção — usado pelo workflow cd.yml na VPS.
# Diferença em relação a docker-compose.yml (dev): os 4 serviços do monorepo usam `image:`
# apontando para o GHCR em vez de `build:`, permitindo `docker compose pull` puxar as imagens
# publicadas por docker-publish.yml sem precisar buildar nada na VPS.
#
# Variáveis esperadas no ambiente/.env da VPS:
#   GHCR_NAMESPACE  -> owner do GHCR (ex: pedroluc-cpu)
#   IMAGE_TAG       -> tag da imagem a implantar (ex: latest, sha-abc1234, v1.2.3)
# ------------------------------------------------------------------------------------------------
name: weather-platform

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBIT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBIT_PASS:-guest}
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  mongodb:
    image: mongo:8
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  nest-api:
    image: ghcr.io/${GHCR_NAMESPACE}/weather-platform-nest-api:${IMAGE_TAG:-latest}
    container_name: nest-api
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      - MONGO_URI=mongodb://mongodb:27017/weatherdb
      - RABBIT_URL=amqp://${RABBIT_USER:-guest}:${RABBIT_PASS:-guest}@rabbitmq:5672/
      - JWT_SECRET=${JWT_SECRET:-changeme}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASS=${ADMIN_PASS:-123456}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/weather?limit=1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  python-producer:
    image: ghcr.io/${GHCR_NAMESPACE}/weather-platform-python-producer:${IMAGE_TAG:-latest}
    container_name: python-producer
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - RABBIT_URL=amqp://${RABBIT_USER:-guest}:${RABBIT_PASS:-guest}@rabbitmq:5672/
      - QUEUE_NAME=weather.data
      - LATITUDE=${LATITUDE:--23.5489}
      - LONGITUDE=${LONGITUDE:--46.6388}
      - LOCATION_NAME=${LOCATION_NAME:-São Paulo}
      - LOCATIONS=${LOCATIONS:-}
      - INTERVAL_SEC=${PUBLISH_INTERVAL_SEC:-3600}
    restart: unless-stopped

  go-worker:
    image: ghcr.io/${GHCR_NAMESPACE}/weather-platform-go-worker:${IMAGE_TAG:-latest}
    container_name: go-worker
    depends_on:
      rabbitmq:
        condition: service_healthy
      nest-api:
        condition: service_healthy
    environment:
      - RABBIT_URL=amqp://${RABBIT_USER:-guest}:${RABBIT_PASS:-guest}@rabbitmq:5672/
      - QUEUE_NAME=weather.data
      - API_ENDPOINT=http://nest-api:3000/api/weather
    restart: unless-stopped

  frontend:
    image: ghcr.io/${GHCR_NAMESPACE}/weather-platform-frontend:${IMAGE_TAG:-latest}
    container_name: frontend
    depends_on:
      nest-api:
        condition: service_healthy
    environment:
      - VITE_API_URL=http://localhost:3000/api
    ports:
      - "5173:5173"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    depends_on:
      nest-api:
        condition: service_healthy
    restart: unless-stopped

  docker-exporter:
    image: wywywywy/docker_stats_exporter:latest
    container_name: docker-exporter
    ports:
      - "9487:9487"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  mongo_data:
  prometheus_data:
  grafana_data:
