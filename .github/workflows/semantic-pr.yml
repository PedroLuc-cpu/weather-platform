# ------------------------------------------------------------------------------------------------
# Workflow: Semantic Pull Request
# Objetivo: validar que o título do PR segue Conventional Commits (feat, fix, refactor, perf,
#           docs, style, test, ci, build, chore, revert).
# Eventos: abertura/edição/sincronização de Pull Requests.
# ------------------------------------------------------------------------------------------------
name: Semantic PR

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: semantic-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-title:
    name: Validate PR title
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check conventional commit title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            refactor
            perf
            docs
            style
            test
            ci
            build
            chore
            revert
          requireScope: false
          subjectPattern: ^(?!\s*$).+$
