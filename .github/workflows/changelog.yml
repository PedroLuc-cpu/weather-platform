# ------------------------------------------------------------------------------------------------
# Workflow: Changelog
# Objetivo: gerar/atualizar CHANGELOG.md automaticamente a partir de Conventional Commits e
#           commitar o resultado de volta na branch de produção.
# Eventos: push na branch de produção (master).
# ------------------------------------------------------------------------------------------------
name: Changelog

on:
  push:
    branches: [master]

# Evita duas execuções concorrentes commitando o CHANGELOG ao mesmo tempo.
concurrency:
  group: changelog-master
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  changelog:
    name: Generate CHANGELOG.md
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Evita loop infinito: não roda de novo no commit que ele mesmo criou.
    if: "!contains(github.event.head_commit.message, 'chore(changelog)')"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog (git-cliff)
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Commit updated CHANGELOG.md
        run: |
          if git diff --quiet -- CHANGELOG.md; then
            echo "CHANGELOG.md sem alterações."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore(changelog): update CHANGELOG.md [skip ci]"
          git push
