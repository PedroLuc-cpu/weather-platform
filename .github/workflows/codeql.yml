# ------------------------------------------------------------------------------------------------
# Workflow: CodeQL Analysis
# Objetivo: análise estática de segurança (SAST) para todas as linguagens do monorepo.
# Eventos: pull_request, push na branch de produção e execução agendada semanal.
# ------------------------------------------------------------------------------------------------
name: CodeQL

on:
  pull_request:
    branches: [master, development]
  push:
    branches: [master]
  schedule:
    # Toda segunda-feira às 03:00 UTC.
    - cron: "0 3 * * 1"

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: go
            build-mode: autobuild
          - language: python
            build-mode: none

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
