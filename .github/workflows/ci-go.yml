# ------------------------------------------------------------------------------------------------
# Workflow: CI Go (go-worker)
# Objetivo: validar exclusivamente o serviço services/go-worker (fmt, vet, lint, testes, build).
#           Não realiza deploy nem publica imagens.
# Eventos: pull_request e push que tocam services/go-worker/**.
# ------------------------------------------------------------------------------------------------
name: CI Go (go-worker)

on:
  pull_request:
    branches: [master, development]
    paths:
      - "services/go-worker/**"
      - ".github/workflows/ci-go.yml"
  push:
    branches: [master, development]
    paths:
      - "services/go-worker/**"
      - ".github/workflows/ci-go.yml"

concurrency:
  group: ci-go-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: services/go-worker

env:
  GO_VERSION: "1.24"

jobs:
  validate:
    name: fmt, vet, lint, test & build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: services/go-worker/go.sum

      - name: Download modules
        run: go mod download

      # gofmt não tem exit code próprio para "diffs encontrados"; falha explicitamente se
      # algum arquivo não estiver formatado.
      - name: Check formatting (gofmt)
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Arquivos não formatados com gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Lint (golangci-lint)
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61.0
          working-directory: services/go-worker
          args: --timeout=5m

      - name: Test
        run: go test -race -cover ./...

      - name: Build
        run: go build -o /tmp/go-worker-build ./...
