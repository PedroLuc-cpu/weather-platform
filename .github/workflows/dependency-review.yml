# ------------------------------------------------------------------------------------------------
# Workflow: Dependency Review
# Objetivo: analisar dependências novas/alteradas em Pull Requests (CVEs, licenças, pacotes
#           maliciosos) e falhar caso exista vulnerabilidade crítica.
# Eventos: apenas pull_request.
# ------------------------------------------------------------------------------------------------
name: Dependency Review

on:
  pull_request:
    branches: [master, development]

concurrency:
  group: dependency-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dependency-review:
    name: Scan dependency changes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4.9.0
        with:
          fail-on-severity: critical
          deny-licenses: GPL-3.0, AGPL-3.0
          comment-summary-in-pr: always
