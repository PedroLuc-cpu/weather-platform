# ------------------------------------------------------------------------------------------------
# Workflow: Secret Scanning
# Objetivo: detectar vazamento de credenciais (AWS, JWT, OpenAI, Anthropic, Azure, Google,
#           tokens genéricos, senhas, certificados) usando Gitleaks com regras estendidas
#           definidas em .gitleaks.toml.
# Eventos: pull_request (diff completo), push na branch de produção e execução agendada.
# Usa o binário do Gitleaks diretamente (CLI open-source), sem a action licenciada, para
# evitar exigência de licença comercial em repositórios privados.
# ------------------------------------------------------------------------------------------------
name: Secret Scanning

on:
  pull_request:
    branches: [master, development]
  push:
    branches: [master, development]
  schedule:
    # Todos os dias às 05:00 UTC.
    - cron: "0 5 * * *"

concurrency:
  group: secret-scanning-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GITLEAKS_VERSION: "8.21.2"

jobs:
  gitleaks:
    name: Scan for leaked secrets
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Gitleaks binary
        id: cache-gitleaks
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/gitleaks
          key: gitleaks-${{ env.GITLEAKS_VERSION }}-linux-x64

      - name: Install Gitleaks
        if: steps.cache-gitleaks.outputs.cache-hit != 'true'
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          chmod +x /usr/local/bin/gitleaks

      - name: Run Gitleaks
        run: |
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --report-format sarif \
            --report-path gitleaks-results.sarif \
            --redact \
            --exit-code 1

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks-results.sarif
          category: gitleaks
