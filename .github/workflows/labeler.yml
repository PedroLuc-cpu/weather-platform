# ------------------------------------------------------------------------------------------------
# Workflow: PR Labeler
# Objetivo: aplicar labels automaticamente em Pull Requests com base nos arquivos alterados,
#           usando as regras definidas em .github/labeler.yml.
# Eventos: abertura/sincronização de Pull Requests.
# ------------------------------------------------------------------------------------------------
name: PR Labeler

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

concurrency:
  group: labeler-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: Apply labels by changed files
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Apply labels
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true
