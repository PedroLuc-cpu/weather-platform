name: weather-platform

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBIT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBIT_PASS:-guest}
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  mongodb:
    image: mongo:8
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  nest-api:
    build: ./services/nest-api
    container_name: nest-api
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      - MONGO_URI=mongodb://mongodb:27017/weatherdb
      - RABBIT_URL=amqp://${RABBIT_USER:-guest}:${RABBIT_PASS:-guest}@rabbitmq:5672/
      - JWT_SECRET=${JWT_SECRET:-changeme}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASS=${ADMIN_PASS:-123456}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/weather?limit=1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  python-producer:
    build: ./services/python-producer
    container_name: python-producer
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - RABBIT_URL=amqp://${RABBIT_USER:-guest}:${RABBIT_PASS:-guest}@rabbitmq:5672/
      - QUEUE_NAME=weather.data
      - LATITUDE=${LATITUDE:--23.5489}
      - LONGITUDE=${LONGITUDE:--46.6388}
      - INTERVAL_SEC=${PUBLISH_INTERVAL_SEC:-3600}
    restart: unless-stopped

  go-worker:
    build: ./services/go-worker
    container_name: go-worker
    depends_on:
      rabbitmq:
        condition: service_healthy
      nest-api:
        condition: service_healthy
    environment:
      - RABBIT_URL=amqp://${RABBIT_USER:-guest}:${RABBIT_PASS:-guest}@rabbitmq:5672/
      - QUEUE_NAME=weather.data
      - API_ENDPOINT=http://nest-api:3000/api/weather
    restart: unless-stopped

  frontend:
    build: ./services/frontend
    container_name: frontend
    depends_on:
      nest-api:
        condition: service_healthy
    environment:
      - VITE_API_URL=http://localhost:3000/api
    ports:
      - "5173:5173"
    restart: unless-stopped

volumes:
  mongo_data:
