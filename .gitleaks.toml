# ------------------------------------------------------------------------------------------------
# Configuração do Gitleaks usada pelo workflow secret-scanning.yml.
# Estende o ruleset padrão (AWS, tokens genéricos, certificados, etc.) e adiciona regras
# específicas para provedores de IA e nuvem usados neste projeto.
# ------------------------------------------------------------------------------------------------
title = "weather-platform gitleaks config"

[extend]
useDefault = true

[[rules]]
id = "openai-api-key"
description = "OpenAI API Key"
regex = '''sk-[A-Za-z0-9]{20,}'''
tags = ["key", "openai"]

[[rules]]
id = "anthropic-api-key"
description = "Anthropic API Key"
regex = '''sk-ant-[A-Za-z0-9\-_]{20,}'''
tags = ["key", "anthropic"]

[[rules]]
id = "azure-storage-key"
description = "Azure Storage Account Key"
regex = '''(?i)AccountKey=[A-Za-z0-9+/=]{40,}'''
tags = ["key", "azure"]

[[rules]]
id = "azure-client-secret"
description = "Azure AD Client Secret"
regex = '''(?i)(azure|arm)[-_ ]?(client[-_ ]?secret)["'\s:=]{1,3}[A-Za-z0-9._~\-]{34,}'''
tags = ["key", "azure"]

[[rules]]
id = "google-api-key"
description = "Google API Key"
regex = '''AIza[0-9A-Za-z\-_]{35}'''
tags = ["key", "google"]

[[rules]]
id = "google-oauth-client-secret"
description = "Google OAuth Client Secret"
regex = '''GOCSPX-[A-Za-z0-9\-_]{20,}'''
tags = ["key", "google"]

[allowlist]
description = "Ignora diretórios de dependências e artefatos de build"
paths = [
  '''node_modules''',
  '''dist''',
  '''build''',
  '''coverage''',
  '''\.git''',
]
